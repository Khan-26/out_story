<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hành trình 900 ngày của chúng mình" />
    <meta name="theme-color" content="#0e3a5c" />
    <title>Our Story ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; background: #0e3a5c; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(180deg, #0e3a5c 0%, #041828 55%, #010c14 100%);
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash.out { opacity: 0; pointer-events: none; }
      @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.22)} }
      #splash-icon { font-size: 3.5rem; animation: beat 1.1s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="splash"><div id="splash-icon">❤️</div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
